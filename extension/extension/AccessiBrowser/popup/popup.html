<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=420, initial-scale=1.0" />
  <meta name="description" content="AccessiScan - WCAG 2.2 Accessibility Auditor. Scan any web page for accessibility violations and receive AI-powered fixes." />
  <title>AccessiScan — WCAG Audit Tool</title>
  <link rel="stylesheet" href="popup.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body role="application" aria-label="AccessiScan Accessibility Auditor">
  <!-- Skip to main content link for keyboard users -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- ── Header ───────────────────────────────────────── -->
  <header id="header" role="banner">
    <div class="logo-row">
      <span class="logo-icon" aria-hidden="true">♿</span>
      <h1>AccessiScan</h1>
    </div>
    <p class="tagline">WCAG 2.2 Accessibility Auditor</p>
  </header>

  <!-- ── Main Content ────────────────────────────────── -->
  <main id="main-content" role="main">
    <!-- ── Scan Panel ───────────────────────────────────── -->
    <section id="scan-panel" aria-label="Scan Controls">
      <div class="url-bar" id="url-bar" role="region" aria-live="polite" aria-label="Current page URL">
        <span class="url-icon" aria-hidden="true">🌐</span>
        <span id="current-url" class="url-text">Detecting page…</span>
      </div>
      <button id="scan-btn" class="btn-primary" aria-label="Start scanning this page for accessibility issues">
        <span class="btn-icon" aria-hidden="true">🔍</span> Scan This Page
      </button>
    </section>

    <!-- ── Loading ──────────────────────────────────────── -->
    <section id="loading-panel" class="hidden" aria-label="Loading indicator" aria-live="polite">
      <div class="spinner" role="status" aria-label="Scanning in progress"></div>
      <p class="loading-text">Scanning for accessibility issues…</p>
      <p class="loading-sub">This may take 10-20 seconds</p>
    </section>

    <!-- ── Results ──────────────────────────────────────── -->
    <section id="results-panel" class="hidden" aria-label="Scan Results">
      <!-- Results Header with Summary -->
      <div class="results-header">
        <div class="summary-bar">
          <div class="summary-left">
            <div class="summary-icon" aria-hidden="true">📊</div>
            <div class="summary-content">
              <div class="summary-label">Scan Complete</div>
              <div class="summary-title" id="issue-count" role="status">0 Issues</div>
              <div class="summary-meta">WCAG 2.2 Compliance Audit</div>
            </div>
          </div>
          <div class="summary-right">
            <button id="download-btn" class="btn-summary-action" aria-label="Download full audit report as PDF">
              <span aria-hidden="true">📥</span>
              <span class="btn-text">Download<br/>Report</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Issues Section -->
      <div class="issues-section">
        <!-- Issues Toolbar -->
        <div class="issues-toolbar">
          <div class="toolbar-left">
            <h2 class="issues-title">Issues</h2>
            <div class="issue-badge" id="issue-badge-count" role="status" aria-label="Total number of issues found">0</div>
          </div>
          <button id="highlight-all-btn" class="btn-highlight" aria-label="Highlight all issues on the page with visual overlays">
            <span aria-hidden="true">🎯</span> Highlight
          </button>
        </div>

        <!-- Filter Section -->
        <fieldset class="filter-section">
          <legend class="filter-label">Filter by Severity</legend>
          <div class="filter-pills" role="group" aria-label="Filter issues by severity level">
            <button class="pill active" data-filter="all" aria-pressed="true">
              <span class="severity-dot" aria-hidden="true"></span> All
            </button>
            <button class="pill" data-filter="critical" aria-pressed="false">
              <span class="severity-dot critical" aria-hidden="true"></span> Critical
            </button>
            <button class="pill" data-filter="serious" aria-pressed="false">
              <span class="severity-dot serious" aria-hidden="true"></span> Serious
            </button>
            <button class="pill" data-filter="moderate" aria-pressed="false">
              <span class="severity-dot moderate" aria-hidden="true"></span> Moderate
            </button>
            <button class="pill" data-filter="minor" aria-pressed="false">
              <span class="severity-dot minor" aria-hidden="true"></span> Minor
            </button>
          </div>
        </fieldset>

        <!-- Issues List -->
        <div id="issues-list" class="issues-list" role="region" aria-label="List of accessibility issues found in the page" aria-live="polite"></div>
      </div>
    </section>

    <!-- ── Error ────────────────────────────────────────── -->
    <section id="error-panel" class="hidden" aria-label="Error message" role="alertdialog">
      <div class="error-card">
        <span class="error-icon" aria-hidden="true">⚠️</span>
        <p class="error-msg" id="error-msg" role="alert">Something went wrong.</p>
        <button id="retry-btn" class="btn-secondary">Try Again</button>
      </div>
    </section>
  </main>

  <!-- ── Remediation Modal ────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden" role="presentation" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      <div class="modal-header">
        <h3 id="modal-title">AI Remediation</h3>
        <button id="modal-close" class="modal-close" aria-label="Close remediation dialog">&times;</button>
      </div>
      <div id="modal-body" class="modal-body">
        <div class="modal-spinner-wrap">
          <div class="spinner small" role="status" aria-label="Generating fix"></div>
          <p>Generating fix…</p>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
